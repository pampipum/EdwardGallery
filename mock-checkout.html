<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Stripe Checkout | Eduard Wurster</title>
    <style>
      :root {
        --bg: #f6f8fc;
        --card: #ffffff;
        --line: #d9e0ea;
        --text: #1f2a35;
        --muted: #5a6a7b;
        --accent: #635bff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .card {
        width: min(32rem, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 1rem;
        padding: 1.1rem;
        box-shadow: 0 12px 36px rgba(28, 42, 58, 0.12);
      }
      .badge {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 700;
        color: #fff;
        background: var(--accent);
        border-radius: 999px;
        padding: 0.2rem 0.55rem;
      }
      h1 { margin: 0.65rem 0 0.3rem; font-size: 1.25rem; }
      p { margin: 0.25rem 0; color: var(--muted); }
      .meta {
        margin-top: 0.9rem;
        padding: 0.8rem;
        border-radius: 0.75rem;
        background: #f3f6fb;
        border: 1px solid #e3e9f2;
      }
      .actions {
        display: flex;
        gap: 0.55rem;
        margin-top: 1rem;
      }
      a {
        text-decoration: none;
        border-radius: 999px;
        padding: 0.56rem 0.9rem;
        font-weight: 700;
      }
      .primary { background: var(--accent); color: #fff; }
      .secondary { background: #eaf0fb; color: #2f4255; }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Mock Stripe Checkout</span>
      <h1 id="workTitle">Artwork</h1>
      <p id="workYear">Year</p>
      <p id="workStatus">Status</p>
      <p>This is a placeholder checkout screen for now, wired from the gallery Acquire button.</p>
      <div class="meta">
        <p><strong>Status:</strong> Demo only</p>
        <p><strong>Next step:</strong> Replace this page with a real Stripe Checkout Session URL.</p>
      </div>
      <div class="actions">
        <a href="./index.html" class="secondary">Back to Gallery</a>
        <a href="#" class="primary">Proceed (Mock)</a>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const title = params.get('title') || 'Eduard Wurster Original';
      const year = params.get('year') || 'Unknown';
      const status = params.get('status') || 'available';
      document.getElementById('workTitle').textContent = title;
      document.getElementById('workYear').textContent = `Year ${year}`;
      document.getElementById('workStatus').textContent = `Status ${status.charAt(0).toUpperCase() + status.slice(1)}`;
    </script>
  </body>
</html>
